{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} - Khazaneh</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #697586;
      --line: #d9e2ec;
      --paper: #f7f9fc;
      --accent: #0f766e;
      --accent-ink: #ffffff;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
      letter-spacing: 0;
    }
    a { color: inherit; text-decoration: none; }
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }
    .bar {
      max-width: 1040px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .brand { font-weight: 750; font-size: 18px; }
    nav { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    nav a, button, input, select {
      min-height: 38px;
      border-radius: 6px;
      font: inherit;
    }
    nav a {
      color: var(--muted);
      padding: 8px 10px;
    }
    nav a:hover { color: var(--ink); }
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }
    h1 { font-size: 28px; margin: 0 0 18px; }
    h2 { font-size: 18px; margin: 26px 0 12px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }
    .card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .metric { color: var(--muted); font-size: 13px; }
    .value { font-size: 24px; font-weight: 750; margin-top: 6px; }
    .error {
      color: var(--danger);
      background: #fff1f0;
      border: 1px solid #f4b8b2;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-size: 13px; font-weight: 650; }
    tr:last-child td { border-bottom: 0; }
    form.inline { display: inline; }
    form.stack {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) 150px 90px auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 18px;
    }
    label { display: grid; gap: 5px; color: var(--muted); font-size: 13px; }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      background: #ffffff;
      padding: 8px 10px;
      color: var(--ink);
    }
    button {
      border: 0;
      background: var(--accent);
      color: var(--accent-ink);
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 650;
    }
    .ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    @media (max-width: 700px) {
      .bar { align-items: flex-start; flex-direction: column; }
      form.stack { grid-template-columns: 1fr; }
      table { font-size: 14px; }
      th, td { padding: 9px 8px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <a class="brand" href="/">Khazaneh</a>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/transactions">Transactions</a>
        <a href="/categories">Categories</a>
        <form class="inline" method="post" action="/logout"><button class="ghost" type="submit">Logout</button></form>
      </nav>
    </div>
  </header>
  <main>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
