{{define "content"}}
<h1>Categories</h1>

<form class="stack" method="post" action="/categories" hx-post="/categories" hx-target="body">
  <label>Name
    <input name="name" required>
  </label>
  <label>Kind
    <select name="kind">
      <option value="expense">Expense</option>
      <option value="income">Income</option>
    </select>
  </label>
  <label>Emoji
    <input name="emoji" maxlength="8">
  </label>
  <button type="submit">Add</button>
</form>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Kind</th>
      <th>Emoji</th>
    </tr>
  </thead>
  <tbody>
    {{range .Categories}}
    <tr>
      <td>{{.Name}}</td>
      <td>{{.Kind}}</td>
      <td>{{.Emoji}}</td>
    </tr>
    {{else}}
    <tr><td colspan="3">No categories yet.</td></tr>
    {{end}}
  </tbody>
</table>
{{end}}
